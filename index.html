<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- โปรไฟล์ -->
    <div class="profile-card">

        <div class="profile-image">
            <img src="images/profile.jpg" alt="Profile">
        </div>

        <div class="profile-info">
            <h1>พลังโชค เคียงอมร</h1>
            <h3>ชื่อเล่น: เก่ง</h3>

            <p>
                ยินดีต้อนรับสู่เว็บไซต์สอบกลางภาค
            </p>
        </div>

    </div>

    <!-- หัวข้อ -->
    <h2>🎬 อนิแมะที่โชคแนะนำ</h2>

    <!-- รายการอนิเมะ -->
    <div class="anime-list">

        <div class="card">
            <span>#1</span>
            <img src="images/anime 1.jpg" alt="">
            <h3>The Apothecary Diaries</h3>
            <p>เรื่องนี้คือที่สุดในใจเพราะ...</p>
        </div>

        <div class="card">
            <span>#2</span>
            <img src="images/anime 2.jpg" alt="">
            <h3>Kaiju No.8</h3>
            <p>เรื่องนี้คือที่สุดในใจเพราะ...</p>
        </div>

        <div class="card">
            <span>#3</span>
            <img src="images/anime 3.jpg" alt="">
            <h3>Alya Sometimes Hides Her Feelings In Russian</h3>
            <p>เรื่องนี้คือที่สุดในใจเพราะ...</p>
        </div>

    </div>

</body>
</html>
